<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aii Prompt Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Archivo:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#E4003A; --red-dark:#B80030; --red-soft:#FFF0F4; --red-line:#FFD6E0;
    --ink:#1C1C22; --ink-soft:#6B6B76; --paper:#FFFFFF; --paper-warm:#FAFAFB;
    --line:#ECECF0; --ok:#0E8A4A;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6}
  header{background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);color:#fff;padding:48px 24px 56px;position:relative;overflow:hidden}
  header::after{content:"";position:absolute;right:-80px;top:-80px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.08)}
  header::before{content:"";position:absolute;right:60px;bottom:-120px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.06)}
  .header-inner{max-width:920px;margin:0 auto;position:relative;z-index:1}
  .eyebrow{font-family:'Archivo',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;opacity:.85;margin-bottom:10px;font-weight:700}
  h1{font-family:'Archivo','IBM Plex Sans Thai',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.01em;line-height:1.15}
  .subtitle{margin-top:12px;font-size:15px;opacity:.92;max-width:560px}
  .sync-note{margin-top:14px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);padding:5px 14px;border-radius:999px}
  .sync-note .dot{width:8px;height:8px;border-radius:50%;background:#7CFFB2}
  .sync-note.off .dot{background:#FFD37C}
  .edit-toggle{position:absolute;top:16px;right:0;z-index:2;font-family:inherit;font-size:12px;font-weight:600;color:rgba(255,255,255,.75);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:5px 14px;cursor:pointer;transition:all .15s}
  .edit-toggle:hover{background:rgba(255,255,255,.24);color:#fff}
  nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 24px}
  .nav-inner{max-width:920px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:13px;font-weight:600;padding:6px 14px;border-radius:999px;border:1px solid var(--red-line);color:var(--red);background:#fff;text-decoration:none;transition:all .15s;white-space:nowrap}
  .chip:hover{background:var(--red-soft)}
  .chip.priority{background:var(--red);color:#fff;border-color:var(--red)}
  .chip.priority:hover{background:var(--red-dark)}
  .search-wrap{max-width:920px;margin:28px auto 0;padding:0 24px}
  .search{width:100%;padding:13px 18px;font-family:inherit;font-size:15px;border:1.5px solid var(--line);border-radius:12px;outline:none;transition:border-color .15s;background:var(--paper-warm)}
  .search:focus{border-color:var(--red);background:#fff}
  main{max-width:920px;margin:0 auto;padding:8px 24px 80px}
  section{margin-top:44px;scroll-margin-top:76px}
  .section-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .section-head h2{font-family:'Archivo','IBM Plex Sans Thai',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
  .section-head .th-label{font-size:13px;color:var(--ink-soft)}
  .section-head .count{font-size:12px;font-weight:700;color:var(--red);background:var(--red-soft);border:1px solid var(--red-line);padding:2px 10px;border-radius:999px}
  .card{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--red);border-radius:12px;padding:16px 18px;margin-bottom:10px;transition:box-shadow .15s,transform .15s}
  .card:hover{box-shadow:0 4px 18px rgba(228,0,58,.09);transform:translateY(-1px)}
  .prompt-text{flex:1;font-size:15px;font-weight:500;color:var(--ink);user-select:all;cursor:text}
  .copy-btn{flex-shrink:0;font-family:inherit;font-size:13px;font-weight:600;color:var(--red);background:var(--red-soft);border:1px solid var(--red-line);border-radius:9px;padding:8px 15px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
  .copy-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
  .copy-btn.copied{background:var(--ok);border-color:var(--ok);color:#fff}
  .copy-btn svg{width:14px;height:14px}
  .tip{background:var(--red-soft);border:1px solid var(--red-line);border-radius:12px;padding:16px 18px;margin-top:24px;font-size:14px;color:var(--ink)}
  .tip strong{color:var(--red)}
  footer{text-align:center;padding:28px 24px 44px;font-size:13px;color:var(--ink-soft);border-top:1px solid var(--line)}
  .hidden{display:none!important}
  .no-results{text-align:center;padding:48px 0;color:var(--ink-soft);font-size:15px;display:none}
  body.edit-mode .copy-btn{display:none}
  body.edit-mode .search-wrap{display:none}
  body.edit-mode .card{border-style:dashed;border-left-style:solid}
  body.edit-mode [contenteditable="true"]{outline:1.5px dashed var(--red-line);outline-offset:3px;border-radius:4px;cursor:text;min-width:40px}
  body.edit-mode [contenteditable="true"]:focus{outline:1.5px solid var(--red)}
  .card-tools{flex-shrink:0;display:flex;gap:6px}
  .mini-btn{font-family:inherit;font-size:13px;font-weight:700;width:32px;height:32px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink-soft);transition:all .15s;line-height:1}
  .mini-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}
  .mini-btn.danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
  .add-btn{display:flex;font-family:inherit;font-size:13px;font-weight:600;color:var(--red);background:#fff;border:1.5px dashed var(--red-line);border-radius:12px;padding:11px 16px;cursor:pointer;width:100%;transition:all .15s;justify-content:center;align-items:center;gap:6px}
  .add-btn:hover{background:var(--red-soft);border-color:var(--red)}
  .add-section-btn{margin-top:36px}
  .edit-bar{position:fixed;left:0;right:0;bottom:0;z-index:100;background:var(--ink);color:#fff;padding:12px 24px;display:none;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
  body.edit-mode .edit-bar{display:flex}
  .edit-bar .hint{font-size:13px;opacity:.75;max-width:440px}
  .bar-btn{font-family:inherit;font-size:14px;font-weight:700;border-radius:10px;padding:10px 20px;cursor:pointer;border:none;transition:all .15s}
  .bar-btn.primary{background:var(--red);color:#fff}
  .bar-btn.primary:hover{background:#FF1A55}
  .bar-btn.primary:disabled{opacity:.5;cursor:wait}
  .bar-btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}
  .bar-btn.ghost:hover{background:rgba(255,255,255,.12)}
  body.edit-mode main{padding-bottom:140px}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);max-width:min(92vw,760px);background:var(--ok);color:#fff;font-size:14px;font-weight:600;padding:10px 22px;border-radius:999px;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;text-align:center}
  .toast.err{background:var(--red-dark)}
  .toast.show{opacity:1}
  /* ---------- Modal (sandbox-safe replacement for prompt/confirm) ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(28,28,34,.55);z-index:300;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .modal{
    background:#fff;border-radius:16px;padding:24px;max-width:380px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .modal h4{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:14px}
  .modal input{
    width:100%;padding:11px 14px;font-family:inherit;font-size:14px;
    border:1.5px solid var(--line);border-radius:10px;outline:none;margin-bottom:16px;
  }
  .modal input:focus{border-color:var(--red)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end}
  .modal-btn{
    font-family:inherit;font-size:14px;font-weight:700;border-radius:10px;
    padding:9px 18px;cursor:pointer;border:none;transition:all .15s;
  }
  .modal-btn.ok{background:var(--red);color:#fff}
  .modal-btn.ok:hover{background:var(--red-dark)}
  .modal-btn.cancel{background:var(--paper-warm);color:var(--ink-soft);border:1px solid var(--line)}
  .modal-btn.cancel:hover{background:var(--line)}
  @media (max-width:560px){
    .card{flex-direction:column;align-items:stretch}
    .copy-btn{justify-content:center}
    .card-tools{justify-content:flex-end}
    .edit-toggle{position:static;margin-bottom:14px;display:inline-block}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <button class="edit-toggle" id="editToggle" title="สำหรับผู้ดูแล Playbook">&#9998; ผู้ดูแล</button>
    <div class="eyebrow">Aii Chatbot &middot; BIC AI Taskforce</div>
    <h1>Prompt Playbook</h1>
    <p class="subtitle">รวมคำถามแนะนำสำหรับใช้งาน Aii Chatbot — กดปุ่ม "คัดลอก" แล้วนำไปวางใน Aii ได้ทันที</p>
    <div class="sync-note hidden" id="syncNote"><span class="dot"></span><span id="syncText"></span></div>
  </div>
</header>

<nav><div class="nav-inner" id="navChips"></div></nav>

<div class="search-wrap">
  <input class="search" id="searchBox" type="text" placeholder="ค้นหา prompt เช่น Gross Add, Churn, พื้นที่ ...">
</div>

<main id="content"></main>
<div class="no-results" id="noResults">ไม่พบ prompt ที่ตรงกับคำค้นหา</div>

<footer>Business Intelligence Center &middot; True Corporation</footer>

<div class="edit-bar">
  <span class="hint">แก้ไขเสร็จแล้วกด "บันทึก" — ข้อมูลจะอัปเดตให้ทุกคนเห็นทันที</span>
  <button class="bar-btn primary" id="saveBtn">&#10003; บันทึกให้ทุกคนเห็น</button>
  <button class="bar-btn ghost" id="exitEditBtn">ยกเลิก / ออกจากโหมดแก้ไข</button>
</div>
<div class="toast" id="toast"></div>

<script>
var PLAYBOOK_API = '/api/playbook';

var DEFAULT_SECTIONS = [
 {"id":"ga","en":"GA","th":"Gross Add — ยอดรับสมาชิกใหม่","priority":true,"prompts":[
  "แสดง TOL Gross Add ปี 2026 แยกตามพื้นที่",
  "แสดง TOL Gross Add แยกตาม Connected Geo และ Channel แยกตามพื้นที่",
  "แสดง GA ของ Prepaid ย้อนหลัง 3 เดือน",
  "แสดง PBH Ranking by GA แยกตาม ปีล่าสุด"]},
 {"id":"ga-inflow","en":"GA & Inflow M1","th":"ดู GA คู่กับ Inflow M1","priority":true,"prompts":[
  "แสดง GA และ Inflow M1 ของ Prepaid ปี 2026 แยกตามพื้นที่",
  "แสดง GA และ Inflow M1 ของ Postpaid ปี 2026 แยกตามพื้นที่",
  "แสดง GA และ Inflow M1 ของ TOL ปี 2026 แยกตามพื้นที่"]},
 {"id":"inflow","en":"Inflow M1","th":"คุณภาพสมาชิกใหม่เดือนแรก","priority":true,"prompts":[
  "แสดง Inflow M1 ของ Prepaid ล่าสุด แยกตามพื้นที่",
  "แสดง Inflow M1 ของ Postpaid ล่าสุด แยกตามพื้นที่",
  "แสดง Inflow M1 ของ TOL ล่าสุด แยกตามพื้นที่"]},
 {"id":"netadd","en":"Net Add","th":"ยอดสมาชิกสุทธิ","priority":true,"prompts":[
  "แสดง Net Add แยกตาม ปี 2026 แยกPBH ด้วยได้ไหม",
  "แสดง Net Add ล่าสุด",
  "แสดง TOL Net Add Trend เดือนนี้ แยกตาม PBH"]},
 {"id":"churn","en":"Churn","th":"การสูญเสียสมาชิก","priority":true,"prompts":[
  "แสดง TOL Churn Subs ปี 2026 ตาม Voluntary Churn และ Involuntary Churn แยกตามพื้นที่/PBH",
  "แสดง Postpaid Churn Subs และ %MoM ของ True และ Dtac ปี 2026 แยกตามพื้นที่",
  "แสดง TOL Churn Rate ย้อนหลัง 3 เดือน แยก"]},
 {"id":"kpi","en":"KPI Performance","th":"ผลงานเทียบเป้าหมาย","priority":false,"prompts":[
  "แสดง KPI Performance และ YTD Achievement ย้อนหลัง 3 เดือน แยกตามพื้นที่/PBH",
  "แสดง Prepaid Performance แยกตาม ปี ล่าสุด เเละ %Achievement",
  "แสดง TOL Performance Actual แยกตาม ปี ล่าสุด"]},
 {"id":"mobile-mks","en":"Mobile Market Share","th":"ส่วนแบ่งตลาดมือถือ","priority":false,"prompts":[
  "แสดง Mobile Subs Share ปี 2026 แยกตามพื้นที่ เปรียบเทียบกับคู่แข่ง",
  "แสดง Mobile Market Share ของ True, Dtac และ AIS"]},
 {"id":"tol-mks","en":"TOL Market Share","th":"ส่วนแบ่งตลาดออนไลน์บ้าน","priority":false,"prompts":[
  "แสดง TOL Market Share แยกตาม Subscriber และ %MKS แยกตามพื้นที่"]},
 {"id":"arpu","en":"ARPU","th":"รายได้เฉลี่ยต่อเลขหมาย","priority":false,"prompts":[
  "ขอ TOL ARPU ของ 3 เดือนที่ผ่านมา",
  "แสดง Prepaid ARPU ย้อนหลัง 3 เดือน"]},
 {"id":"revenue","en":"Service Revenue","th":"รายได้จากบริการ","priority":false,"prompts":[
  "แสดง Service Revenue by Product และ YTD ปี 2026 แยกตามจังหวัด/ภูมิภาค/ช่องทาง",
  "แสดง Service Revenue ล่าสุด ของ Geo Channel"]},
 {"id":"caller","en":"Active Caller","th":"ผู้ใช้งานที่มีการโทรจริง","priority":false,"prompts":[
  "แสดง Active Caller ล่าสุด แยกตามพื้นที่",
  "แสดง Active Caller และ YoY แยกตาม ปี 2026"]},
 {"id":"ap1d","en":"AP1D","th":"Active Prepaid 1 Day","priority":false,"prompts":[
  "แสดง AP1D ของ Prepaid ปี 2026 แยกตามพื้นที่"]},
 {"id":"network","en":"Network Quality","th":"คุณภาพเครือข่าย","priority":false,"prompts":[
  "แสดงข้อมูล Blackcell 4G และ Blackcell 5G ปี 2026 แยกตามพื้นที่ เปรียบเทียบกับเดือนก่อนด้วย"]},
 {"id":"salein","en":"Sale-In","th":"ยอดขายเข้าช่องทาง","priority":false,"prompts":[
  "แสดง TOL Sale-In และ MTD ล่าสุด"]}
];

var SECTIONS = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
var LAST_UPDATED = null;

var copyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
var checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

var nav = document.getElementById('navChips');
var main = document.getElementById('content');
var body = document.body;
var editMode = false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* Sandbox-safe modal: replaces window.prompt / window.confirm which are blocked in artifacts */
function askModal(opts){
  return new Promise(function(resolve){
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    var box = document.createElement('div');
    box.className = 'modal';
    var h = document.createElement('h4');
    h.textContent = opts.title;
    box.appendChild(h);
    var input = null;
    if(opts.input){
      input = document.createElement('input');
      input.type = opts.password ? 'password' : 'text';
      input.placeholder = opts.placeholder || '';
      box.appendChild(input);
    }
    var actions = document.createElement('div');
    actions.className = 'modal-actions';
    var cancel = document.createElement('button');
    cancel.className = 'modal-btn cancel';
    cancel.textContent = opts.cancelText || 'ยกเลิก';
    var ok = document.createElement('button');
    ok.className = 'modal-btn ok';
    ok.textContent = opts.okText || 'ตกลง';
    actions.appendChild(cancel);
    actions.appendChild(ok);
    box.appendChild(actions);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    function close(val){ document.body.removeChild(overlay); resolve(val); }
    ok.addEventListener('click', function(){ close(input ? input.value : true); });
    cancel.addEventListener('click', function(){ close(null); });
    overlay.addEventListener('click', function(e){ if(e.target === overlay) close(null); });
    if(input){
      input.addEventListener('keydown', function(e){ if(e.key === 'Enter') close(input.value); });
      setTimeout(function(){ input.focus(); }, 50);
    }
  });
}

/* ============ Cloudflare Access + D1 data ============ */
var canEdit = false;
function loadPublished(){
  return fetch(PLAYBOOK_API, {cache:'no-store', credentials:'same-origin'})
    .then(function(res){
      if(!res.ok) return res.json().catch(function(){ return {}; }).then(function(body){ throw new Error(body.error || 'data unavailable'); });
      return res.json();
    })
    .then(function(obj){
      canEdit = !!(obj && obj.canEdit);
      if(!obj || !Array.isArray(obj.sections) || !obj.sections.length) return false;
      SECTIONS = obj.sections;
      LAST_UPDATED = obj.updated || null;
      return true;
    })
    .catch(function(){ return false; });
}
function savePublished(){
  return fetch(PLAYBOOK_API, {
    method:'POST', credentials:'same-origin', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sections:SECTIONS})
  }).then(function(res){
    if(!res.ok) return res.json().catch(function(){ return {}; }).then(function(body){ throw new Error(body.error || 'save failed'); });
    return res.json();
  });
}

function showSyncNote(fromShared){
  var note = document.getElementById('syncNote');
  var txt = document.getElementById('syncText');
  note.classList.remove('hidden');
  if(fromShared){
    note.classList.remove('off');
    if(LAST_UPDATED){
      var d = new Date(LAST_UPDATED);
      txt.textContent = 'อัปเดตล่าสุด ' + d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}) + ' ' + d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    }else{
      txt.textContent = 'เวอร์ชันเผยแพร่ล่าสุด';
    }
  }else{
    note.classList.add('off');
    txt.textContent = 'เวอร์ชันเริ่มต้น';
  }
}

function toast(msg, isErr){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(function(){ t.className = 'toast' + (isErr ? ' err' : ''); }, 2800);
}

/* ============================ Render ============================ */
function render(){
  nav.innerHTML = '';
  main.innerHTML = '';
  var ce = editMode ? ' contenteditable="true" spellcheck="false"' : '';

  SECTIONS.forEach(function(sec, si){
    var chip = document.createElement('a');
    chip.href = 'javascript:void(0)';
    chip.className = 'chip'+(sec.priority?' priority':'');
    chip.textContent = sec.en;
    chip.addEventListener('click', function(e){
      e.preventDefault();
      var target = document.getElementById(sec.id);
      if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
    });
    nav.appendChild(chip);

    var section = document.createElement('section');
    section.id = sec.id;
    section.dataset.index = si;

    var head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = '<h2'+ce+' data-field="en">'+esc(sec.en)+'</h2>'
      + '<span class="th-label"'+ce+' data-field="th">'+esc(sec.th)+'</span>'
      + '<span class="count">'+sec.prompts.length+' prompt'+(sec.prompts.length>1?'s':'')+'</span>';
    if(editMode){
      var stools = document.createElement('div');
      stools.className = 'card-tools';
      stools.appendChild(miniBtn('\u2191','ย้ายหัวข้อขึ้น',function(){moveSection(si,-1)}));
      stools.appendChild(miniBtn('\u2193','ย้ายหัวข้อลง',function(){moveSection(si,1)}));
      stools.appendChild(miniBtn('\u2605', sec.priority?'เอาออกจากกลุ่มไฮไลต์':'ไฮไลต์หัวข้อนี้', function(){ commitEdits(); SECTIONS[si].priority=!SECTIONS[si].priority; render(); }));
      stools.appendChild(miniBtn('\u00D7','ลบหัวข้อนี้ทั้งหมด',function(){deleteSection(si)},true));
      head.appendChild(stools);
    }
    section.appendChild(head);

    sec.prompts.forEach(function(p, pi){
      var card = document.createElement('div');
      card.className = 'card';
      var txt = document.createElement('div');
      txt.className = 'prompt-text';
      if(editMode){ txt.contentEditable = 'true'; txt.spellcheck = false; }
      txt.textContent = p;
      card.appendChild(txt);

      if(editMode){
        var tools = document.createElement('div');
        tools.className = 'card-tools';
        tools.appendChild(miniBtn('\u2191','ย้ายขึ้น',function(){movePrompt(si,pi,-1)}));
        tools.appendChild(miniBtn('\u2193','ย้ายลง',function(){movePrompt(si,pi,1)}));
        tools.appendChild(miniBtn('\u00D7','ลบ prompt นี้',function(){deletePrompt(si,pi)},true));
        card.appendChild(tools);
      }else{
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.innerHTML = copyIcon + '<span>คัดลอก</span>';
        btn.addEventListener('click', function(){ copyPrompt(btn, txt.textContent); });
        card.appendChild(btn);
      }
      section.appendChild(card);
    });

    if(editMode){
      var add = document.createElement('button');
      add.className = 'add-btn';
      add.textContent = '+ เพิ่ม prompt ในหัวข้อนี้';
      add.addEventListener('click', function(){ commitEdits(); SECTIONS[si].prompts.push('พิมพ์ prompt ใหม่ที่นี่...'); render(); });
      section.appendChild(add);
    }
    main.appendChild(section);
  });

  if(editMode){
    var addSec = document.createElement('button');
    addSec.className = 'add-btn add-section-btn';
    addSec.textContent = '+ เพิ่มหัวข้อใหม่';
    addSec.addEventListener('click', function(){
      commitEdits();
      SECTIONS.push({id:'topic-'+Date.now(), en:'New Topic', th:'คำอธิบายหัวข้อ', priority:false, prompts:['พิมพ์ prompt ใหม่ที่นี่...']});
      render();
      window.scrollTo({top:document.body.scrollHeight});
    });
    main.appendChild(addSec);
  }else{
    var tip = document.createElement('div');
    tip.className = 'tip';
    tip.id = 'tipBox';
    tip.innerHTML = '<strong>เคล็ดลับ:</strong> ปรับแต่ง prompt ได้ตามต้องการ เช่น เปลี่ยนปี ช่วงเวลา หรือระบุพื้นที่/PBH ที่สนใจ แล้ว Aii จะดึงข้อมูลตามเงื่อนไขใหม่ให้อัตโนมัติ';
    main.appendChild(tip);
  }
}

function miniBtn(label, title, fn, danger){
  var b = document.createElement('button');
  b.className = 'mini-btn'+(danger?' danger':'');
  b.textContent = label;
  b.title = title;
  b.addEventListener('click', fn);
  return b;
}

function commitEdits(){
  if(!editMode) return;
  document.querySelectorAll('main section').forEach(function(sectionEl){
    var si = +sectionEl.dataset.index;
    if(isNaN(si) || !SECTIONS[si]) return;
    var en = sectionEl.querySelector('[data-field="en"]');
    var th = sectionEl.querySelector('[data-field="th"]');
    if(en) SECTIONS[si].en = en.textContent.trim() || 'Untitled';
    if(th) SECTIONS[si].th = th.textContent.trim();
    sectionEl.querySelectorAll('.prompt-text').forEach(function(t, pi){
      if(SECTIONS[si].prompts[pi] !== undefined) SECTIONS[si].prompts[pi] = t.textContent.trim();
    });
  });
}

function movePrompt(si, pi, dir){
  commitEdits();
  var arr = SECTIONS[si].prompts, ni = pi + dir;
  if(ni < 0 || ni >= arr.length) return;
  var tmp = arr[pi]; arr[pi] = arr[ni]; arr[ni] = tmp;
  render();
}
function deletePrompt(si, pi){
  commitEdits();
  SECTIONS[si].prompts.splice(pi,1);
  if(SECTIONS[si].prompts.length===0){
    askModal({title:'หัวข้อนี้ไม่มี prompt เหลือแล้ว ต้องการลบหัวข้อด้วยหรือไม่?', okText:'ลบหัวข้อ'}).then(function(yes){
      if(yes) SECTIONS.splice(si,1);
      render();
    });
    return;
  }
  render();
}
function moveSection(si, dir){
  commitEdits();
  var ni = si + dir;
  if(ni < 0 || ni >= SECTIONS.length) return;
  var tmp = SECTIONS[si]; SECTIONS[si] = SECTIONS[ni]; SECTIONS[ni] = tmp;
  render();
}
function deleteSection(si){
  askModal({title:'ลบหัวข้อ "'+SECTIONS[si].en+'" และ prompt ทั้งหมดในหัวข้อนี้?', okText:'ลบ'}).then(function(yes){
    if(!yes) return;
    commitEdits();
    SECTIONS.splice(si,1);
    render();
  });
}

/* --- Copy --- */
function copyPrompt(btn, text){
  var done = function(){
    btn.classList.add('copied');
    btn.innerHTML = checkIcon + '<span>คัดลอกแล้ว</span>';
    setTimeout(function(){
      btn.classList.remove('copied');
      btn.innerHTML = copyIcon + '<span>คัดลอก</span>';
    }, 1800);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){ fallbackCopy(text, done); });
  }else{
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  document.body.removeChild(ta);
}

/* --- Search --- */
var searchBox = document.getElementById('searchBox');
var noResults = document.getElementById('noResults');
searchBox.addEventListener('input', function(){
  var q = searchBox.value.trim().toLowerCase();
  var anyVisible = false;
  document.querySelectorAll('main section').forEach(function(sec){
    var secVisible = false;
    sec.querySelectorAll('.card').forEach(function(card){
      var match = card.querySelector('.prompt-text').textContent.toLowerCase().indexOf(q) !== -1
        || sec.querySelector('h2').textContent.toLowerCase().indexOf(q) !== -1;
      card.classList.toggle('hidden', !match);
      if(match) secVisible = true;
    });
    sec.classList.toggle('hidden', !secVisible);
    if(secVisible) anyVisible = true;
  });
  noResults.style.display = anyVisible ? 'none' : 'block';
  var tip = document.getElementById('tipBox');
  if(tip) tip.classList.toggle('hidden', q.length>0);
});

/* --- Admin gate + edit mode --- */
document.getElementById('editToggle').addEventListener('click', function(){
  if(editMode){ exitEdit(); return; }
  if(!canEdit){
    toast('บัญชีนี้ไม่มีสิทธิ์แก้ไข โปรดเข้าสู่ระบบด้วยอีเมลแอดมินผ่าน Cloudflare Access', true);
    return;
  }
  editMode = true;
  body.classList.add('edit-mode');
  searchBox.value = '';
  render();
});
document.getElementById('exitEditBtn').addEventListener('click', exitEdit);
function exitEdit(){
  editMode = false;
  body.classList.remove('edit-mode');
  // Reload the published version so unsaved edits are discarded cleanly.
  loadPublished().then(function(fromShared){
    if(!fromShared) SECTIONS = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
    render();
    showSyncNote(fromShared);
  });
}

/* --- Save to the Cloudflare D1 API --- */
document.getElementById('saveBtn').addEventListener('click', function(){
  var btn = this;
  commitEdits();
  btn.disabled = true;
  savePublished()
    .then(function(result){
      LAST_UPDATED = result.updated || new Date().toISOString();
      editMode = false;
      body.classList.remove('edit-mode');
      render();
      showSyncNote(true);
      toast('บันทึกแล้ว — ทุกคนจะเห็นข้อมูลใหม่ทันที');
    })
    .catch(function(err){
      toast('บันทึกไม่สำเร็จ: ' + ((err && err.message) || 'ลองอีกครั้ง'), true);
    })
    .then(function(){ btn.disabled = false; });
});

/* --- Init --- */
render();
loadPublished().then(function(fromShared){
  if(fromShared) render();
  showSyncNote(fromShared);
});
</script>
